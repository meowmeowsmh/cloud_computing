services:

  # ── DATABASES ──────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: cloudeats-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-secret123}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-cloudeats_db}
      MYSQL_USER:          ${MYSQL_USER:-cloudeats_user}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-cloudeats_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - cloudeats-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout:  5s
      retries:  5

  redis:
    image: redis:7-alpine
    container_name: cloudeats-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - cloudeats-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  3s
      retries:  5

  mongodb:
    image: mongo:6.0
    container_name: cloudeats-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-secret123}
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - cloudeats-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── MICROSERVICES ──────────────────────────────

  user-service:
    build:
      context: ./services/user-service
    container_name: cloudeats-user-service
    restart: unless-stopped
    environment:
      PORT:        3001
      MYSQL_HOST:     mysql
      MYSQL_USER:     ${MYSQL_USER:-cloudeats_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-cloudeats_pass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cloudeats_db}
      REDIS_HOST:  redis
      REDIS_PORT:  6379
      JWT_SECRET:  ${JWT_SECRET:-your_jwt_secret}
      NODE_ENV:    ${NODE_ENV:-production}
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cloudeats-network

  menu-service:
    build:
      context: ./services/menu-service
    container_name: cloudeats-menu-service
    restart: unless-stopped
    environment:
      PORT:        3002
      MYSQL_HOST:     mysql
      MYSQL_USER:     ${MYSQL_USER:-cloudeats_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-cloudeats_pass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cloudeats_db}
      NODE_ENV:    ${NODE_ENV:-production}
    ports:
      - "3002:3002"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cloudeats-network

  order-service:
    build:
      context: ./services/order-service
    container_name: cloudeats-order-service
    restart: unless-stopped
    environment:
      PORT:           3003
      MONGO_URL:      mongodb://mongodb:27017
      REDIS_URL:      redis://redis:6379
      JWT_SECRET:     ${JWT_SECRET:-your_jwt_secret}
      NODE_ENV:       ${NODE_ENV:-production}
    ports:
      - "3003:3003"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cloudeats-network

  api-gateway:
    build:
      context: ./services/api-gateway
    container_name: cloudeats-api-gateway
    restart: unless-stopped
    environment:
      PORT:              8000
      USER_SERVICE_URL:  http://user-service:3001
      MENU_SERVICE_URL:  http://menu-service:3002
      ORDER_SERVICE_URL: http://order-service:3003
      JWT_SECRET:        ${JWT_SECRET:-your_jwt_secret}
      NODE_ENV:          ${NODE_ENV:-production}
    ports:
      - "8000:8000"
    depends_on:
      - user-service
      - menu-service
      - order-service
    networks:
      - cloudeats-network

# ── NETWORKS ─────────────────────────────────
networks:
  cloudeats-network:
    driver: bridge
    name:   cloudeats-network

# ── VOLUMES (Data Persistence) ───────────────
volumes:
  mysql-data:
    name: cloudeats-mysql-data
  redis-data:
    name: cloudeats-redis-data
  mongo-data:
    name: cloudeats-mongo-data